<!DOCTYPE html>
<html>
  <head>
    <title>Real-time Chat</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        margin: 0;
        padding: 0;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 4px;
      }
      h1 {
        text-align: center;
        margin-top: 0;
      }
      #messages {
        list-style-type: none;
        margin: 0;
        padding: 0;
        overflow-y: scroll;
        max-height: 300px;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 10px;
      }
      #messages li {
        padding: 5px 10px;
        background-color: #f2f2f2;
        border-radius: 4px;
        margin-bottom: 5px;
      }
      #messages li:nth-child(odd) {
        background-color: #e0e0e0;
      }
      input[type='text'],
      input[type='email'] {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      #register-form {
        display: none;
      }
      #error-message {
        color: red;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Real-time Chat</h1>
      <div id="register-form">
        <label for="name">Name:</label>
        <input id="name" type="text" placeholder="Enter your name" required />
        <label for="email">Email:</label>
        <input id="email" type="email" placeholder="Enter your email address" required />
        <button id="register-btn">Register</button>
        <div id="error-message"></div>
      </div>
      <ul id="messages"></ul>
      <input id="input" type="text" autocomplete="off" placeholder="Type your message..." />
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const registerForm = document.getElementById('register-form');
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const registerBtn = document.getElementById('register-btn');
      const errorMessage = document.getElementById('error-message');
      const messagesList = document.getElementById('messages');
      const input = document.getElementById('input');
      let username = '';

      // Hide the input and show the registration form initially
      input.style.display = 'none';
      registerForm.style.display = 'block';

      // Register button click event
      registerBtn.addEventListener('click', () => {
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        if (email.endsWith('@srmist.edu.in')) {
          username = name;
          registerForm.style.display = 'none';
          input.style.display = 'block';
        } else {
          errorMessage.textContent = 'Please enter a valid email ending with @srmist.edu.in';
        }
      });

      // Send chat message when the Enter key is pressed
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          const message = input.value.trim();
          if (message !== '') {
            const chatMessage = `${username}: ${message}`;
            socket.emit('chat message', chatMessage);
            input.value = '';
          }
        }
      });

      // Receive chat message and display it
      socket.on('chat message', (message) => {
        const li = document.createElement('li');
        li.textContent = message;
        messagesList.appendChild(li);
        scrollToBottom();
      });

      // Scroll to the bottom of the messages
      function scrollToBottom() {
        messagesList.scrollTop = messagesList.scrollHeight;
      }
    </script>
  </body>
</html>
